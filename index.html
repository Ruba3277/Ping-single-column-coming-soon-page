<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <title>Frontend Mentor | Ping coming soon page</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  
<body>
  <header>
   <div class="img-wrapper">
    <img src="logo.svg" class="logo" alt="logo">
   </div>
  </header>
  <main>
   <div class="welcome">
    <h1>We are launching <span>soon!</span></h1>
    <p>Subscribe and get notified</p>
   </div>
   <div class="button-section">
    <div class="login">
      <input type="email" id="email" name="email" placeholder="Your Email Address..." autocomplete="email">
      <p id="error" style="display: none;">Please provide a valid Email address</p>
    </div>
    <button type="submit" id="notify">Notify Me</button>
   </div>
   
   <div class="main-image">
      <img src="illustration-dashboard.png" class ="image" alt="image">
   </div>
  </main>
  <footer>
    <div class="social-icons">
       <a href="#"><i class="fab fa-facebook-f"></i></a>
       <a href="#" class="twitter">
         <i class="fab fa-twitter"></i>
        </a>
       <a href="#"><i class="fab fa-instagram"></i></a>
       
      </div>
      <p class="copyright">&copy; Copyright Ping. All rights reserved.</p>

  </footer>
  

<script src="script.js"></script>      
</body>
</html>
